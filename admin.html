<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Portal | LocalServe</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        .admin-panel {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .admin-card {
            background: radial-gradient(circle at top left, #0b1220, #020617 70%);
            border-radius: 1.1rem;
            padding: 1.5rem;
            border: 1px solid rgba(148, 163, 184, 0.35);
        }

        .admin-card h3 {
            margin-top: 0;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        .data-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .data-item {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.15);
            padding: 0.8rem;
            border-radius: 0.6rem;
            font-size: 0.85rem;
        }

        .data-item span.badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 0.7rem;
            margin-right: 0.5rem;
        }
    </style>
</head>

<body>
    <header class="topbar">
        <div class="container topbar__content">
            <div class="logo">Local<span>Serve</span> Admin</div>
            <nav class="nav">
                <a href="index.html">Back to Main</a>
                <div id="user-info" class="user-info hidden">
                    <span id="user-name-display"></span>
                    <button id="logoutBtn" class="logout-btn">Logout</button>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <section id="login-section" class="section">
            <div class="container" style="max-width: 400px; margin-top: 5rem;">
                <div class="section__header text-center">
                    <h2>Admin Login</h2>
                    <p>Sign in to access the portal.</p>
                </div>
                <form id="adminLoginForm" class="contact__form">
                    <label>
                        Email (admin@example.com)
                        <input type="email" id="loginEmail" value="admin@example.com" required />
                    </label>
                    <label>
                        Password (admin123)
                        <input type="password" id="loginPassword" value="admin123" required />
                    </label>
                    <button type="submit" style="width: 100%;">Login as Admin</button>
                    <p id="loginStatus" class="form-message"></p>
                </form>
            </div>
        </section>

        <section id="dashboard-section" class="section hidden">
            <div class="container" style="margin-top: 2rem;">
                <div class="section__header">
                    <h2>Admin Overview</h2>
                    <p>Manage users, requests, jobs, and contact messages.</p>
                </div>

                <div class="admin-panel">
                    <div class="admin-card">
                        <h3>Support & Help Messages</h3>
                        <div id="contactFeed" class="data-list"></div>
                    </div>

                    <div class="admin-card">
                        <h3>Quick Service Requests</h3>
                        <div id="quickRequestsFeed" class="data-list"></div>
                    </div>

                    <div class="admin-card">
                        <h3>Registered Users & Workers</h3>
                        <div id="usersFeed" class="data-list"></div>
                    </div>

                    <div class="admin-card">
                        <h3>Part-time Jobs Posted</h3>
                        <div id="jobsFeed" class="data-list"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="admin.js"></script>
</body>

</html>
